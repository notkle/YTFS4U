<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>YTFS4U</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #FF0000;
    --dark: #0a0a0a;
    --mid: #161616;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #555;
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* ── HOME ── */
  #home {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 32px;
  }

  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
  }

  .logo-icon {
    width: 56px;
    height: 56px;
    background: var(--red);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }

  .logo h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.03em;
  }

  .logo p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    max-width: 260px;
  }

  .input-wrap {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus { border-color: var(--red); }

  button.go {
    width: 100%;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  button.go:active { opacity: 0.8; transform: scale(0.98); }

  .hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  .error-msg {
    display: none;
    background: #1a0000;
    border: 1px solid #440000;
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    color: #ff6666;
    text-align: center;
    line-height: 1.5;
  }
  .error-msg.show { display: block; }

  /* ── PLAYER SCREEN ── */
  #player-screen {
    display: none;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
    background: #000;
  }

  #player-screen.active { display: flex; }

  /* top bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    padding-top: max(10px, env(safe-area-inset-top));
    background: #000;
    gap: 10px;
    flex-shrink: 0;
    z-index: 10;
  }

  .top-bar button {
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .top-bar button:active { opacity: 0.6; }

  .top-bar button.on { background: var(--red); }

  .video-title {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    text-align: center;
  }

  /* iframe wrapper — fills ALL remaining space, no aspect ratio box */
  .iframe-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
    min-height: 0; /* critical for flex children */
  }

  #yt-iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* fullscreen overlay mode */
  #player-screen.fullscreen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    height: 100%;
    width: 100%;
  }

  /* hide top bar in fullscreen to maximise video */
  #player-screen.fullscreen .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  #player-screen.fullscreen .top-bar.visible {
    opacity: 1;
    pointer-events: all;
  }

  #player-screen.fullscreen .iframe-wrap {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* fullscreen button style */
  #fs-btn {
    font-size: 16px;
    padding: 8px 12px !important;
  }
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <div class="logo">
    <div class="logo-icon">▶</div>
    <h1>YTFS4U</h1>
    <p>Watch YouTube with captions in real fullscreen — no subtitles disappearing.</p>
  </div>

  <div class="input-wrap">
    <input
      type="text"
      id="url-input"
      placeholder="Paste YouTube URL or video ID"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    />
    <div class="error-msg" id="error-msg">Couldn't find a YouTube video in that URL. Try pasting the full link.</div>
    <button class="go" onclick="loadVideo()">Watch →</button>
  </div>

  <p class="hint">Works with youtube.com links, youtu.be links,<br>playlists, and bare video IDs</p>
</div>

<!-- PLAYER -->
<div id="player-screen">
  <div class="top-bar" id="top-bar">
    <button onclick="goHome()">← Back</button>
    <span class="video-title" id="video-title"></span>
    <button id="cc-btn" class="on" onclick="toggleCC()">CC</button>
    <button id="fs-btn" onclick="toggleFullscreen()">⛶</button>
  </div>
  <div class="iframe-wrap" id="iframe-wrap">
    <iframe
      id="yt-iframe"
      allow="autoplay; fullscreen"
      allowfullscreen
    ></iframe>
  </div>
</div>

<script>
  let ccOn = true;
  let isFullscreen = false;
  let barTimeout;

  function extractIds(raw) {
    raw = raw.trim();
    if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return { videoId: raw, listId: null };
    try {
      if (raw.includes('youtu.be/')) {
        if (!raw.startsWith('http')) raw = 'https://' + raw;
        const u = new URL(raw);
        return { videoId: u.pathname.slice(1).split('?')[0], listId: u.searchParams.get('list') };
      }
      if (!raw.startsWith('http')) raw = 'https://' + raw;
      const u = new URL(raw);
      return { videoId: u.searchParams.get('v'), listId: u.searchParams.get('list') };
    } catch { return { videoId: null, listId: null }; }
  }

  function buildSrc(videoId, listId, cc) {
    const params = new URLSearchParams({
      autoplay: '1',
      rel: '0',
      modestbranding: '1',
      cc_load_policy: cc ? '1' : '0',
      cc_lang_pref: 'en',
    });
    if (listId) { params.set('list', listId); params.set('listType', 'playlist'); }
    const base = videoId
      ? `https://www.youtube-nocookie.com/embed/${videoId}`
      : `https://www.youtube-nocookie.com/embed/videoseries`;
    return `${base}?${params.toString()}`;
  }

  function loadVideo() {
    const raw = document.getElementById('url-input').value;
    const err = document.getElementById('error-msg');
    err.classList.remove('show');
    const { videoId, listId } = extractIds(raw);
    if (!videoId && !listId) { err.classList.add('show'); return; }

    ccOn = true;
    document.getElementById('yt-iframe').src = buildSrc(videoId, listId, ccOn);
    document.getElementById('cc-btn').classList.add('on');
    document.getElementById('video-title').textContent = '';
    document.getElementById('home').style.display = 'none';
    document.getElementById('player-screen').classList.add('active');
  }

  function goHome() {
    exitFullscreen();
    document.getElementById('player-screen').classList.remove('active');
    document.getElementById('home').style.display = '';
    document.getElementById('yt-iframe').src = '';
  }

  function toggleCC() {
    ccOn = !ccOn;
    document.getElementById('cc-btn').classList.toggle('on', ccOn);
    const iframe = document.getElementById('yt-iframe');
    const url = new URL(iframe.src);
    url.searchParams.set('cc_load_policy', ccOn ? '1' : '0');
    url.searchParams.set('autoplay', '1');
    iframe.src = url.toString();
  }

  function toggleFullscreen() {
    if (isFullscreen) exitFullscreen();
    else enterFullscreen();
  }

  function enterFullscreen() {
    const ps = document.getElementById('player-screen');

    // Try real requestFullscreen on our div first (keeps captions, works on iPad)
    const el = ps;
    if (el.requestFullscreen) {
      el.requestFullscreen().then(() => { isFullscreen = true; updateFsBtn(); }).catch(() => fakeFull());
    } else if (el.webkitRequestFullscreen) {
      el.webkitRequestFullscreen();
      isFullscreen = true; updateFsBtn();
    } else {
      fakeFull();
    }

    // Lock landscape
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }
  }

  function fakeFull() {
    // Fallback: CSS fixed overlay (iPhone — requestFullscreen not supported)
    const ps = document.getElementById('player-screen');
    ps.classList.add('fullscreen');
    isFullscreen = true;
    updateFsBtn();

    // Tap to show/hide bar
    ps.addEventListener('click', handleFsTap);
  }

  function handleFsTap(e) {
    if (e.target.closest('button')) return;
    const bar = document.getElementById('top-bar');
    bar.classList.add('visible');
    clearTimeout(barTimeout);
    barTimeout = setTimeout(() => bar.classList.remove('visible'), 2500);
  }

  function exitFullscreen() {
    const ps = document.getElementById('player-screen');
    ps.classList.remove('fullscreen');
    document.getElementById('top-bar').classList.remove('visible');
    ps.removeEventListener('click', handleFsTap);

    if (document.fullscreenElement || document.webkitFullscreenElement) {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }

    if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
    isFullscreen = false;
    updateFsBtn();
  }

  function updateFsBtn() {
    document.getElementById('fs-btn').textContent = isFullscreen ? '✕FS' : '⛶';
  }

  // Listen for native fullscreen exit (e.g. user presses home)
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) { isFullscreen = false; updateFsBtn(); }
  });
  document.addEventListener('webkitfullscreenchange', () => {
    if (!document.webkitFullscreenElement) { isFullscreen = false; updateFsBtn(); }
  });

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadVideo();
  });

  const urlParams = new URLSearchParams(window.location.search);
  const prefill = urlParams.get('url') || urlParams.get('v');
  if (prefill) { document.getElementById('url-input').value = prefill; loadVideo(); }
</script>
</body>
</html>
