<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>YTFS4U</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #FF0000;
    --dark: #0a0a0a;
    --mid: #161616;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #555;
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* ── HOME ── */
  #home {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 32px;
  }

  .logo {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px; text-align: center;
  }
  .logo-icon {
    width: 56px; height: 56px; background: var(--red);
    border-radius: 14px; display: flex; align-items: center;
    justify-content: center; font-size: 26px;
  }
  .logo h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; }
  .logo p { font-size: 13px; color: var(--muted); line-height: 1.5; max-width: 260px; }

  .input-wrap { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 10px; }

  input[type="text"] {
    width: 100%; background: var(--mid); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px; font-size: 15px; color: var(--text);
    outline: none; transition: border-color 0.15s; -webkit-appearance: none;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus { border-color: var(--red); }

  button.go {
    width: 100%; background: var(--red); color: #fff; border: none;
    border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 600;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  button.go:active { opacity: 0.8; }
  .hint { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.6; }
  .error-msg {
    display: none; background: #1a0000; border: 1px solid #440000;
    border-radius: 10px; padding: 14px 18px; font-size: 13px;
    color: #ff6666; text-align: center; line-height: 1.5;
  }
  .error-msg.show { display: block; }

  /* ── PLAYER CONTAINER ── */
  #player-screen {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 50;
    background: #000;
  }
  #player-screen.active { display: block; }

  /* LAYER 1 (bottom): transparent scrollable div — only used for chrome collapse automation */
  #scroll-layer {
    position: absolute;
    top: 0; left: 0; width: 100%;
    height: 100%;
    overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
    z-index: 1;
    /* invisible but scrollable */
    background: transparent;
  }
  /* tall inner content gives scroll-layer room to scroll */
  #scroll-layer-inner {
    height: 3000px;
    width: 100%;
  }

  /* LAYER 2: iframe fills entire screen */
  #iframe-layer {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 2;
  }
  #yt-iframe {
    width: 100%; height: 100%;
    border: none; display: block;
  }

  /* LAYER 3 (top): overlay controls — fades out, reappears on tap */
  #controls-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%;
    z-index: 4;
    padding: 10px 14px;
    padding-top: max(10px, env(safe-area-inset-top));
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
    transition: opacity 0.4s ease;
    pointer-events: all;
  }
  #controls-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #controls-overlay button {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
    flex-shrink: 0;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  #controls-overlay button:active { opacity: 0.6; }
  #controls-overlay button.on { background: var(--red); border-color: var(--red); }

  .spacer { flex: 1; }

  /* Tap catcher: invisible layer above iframe to catch taps */
  #tap-catcher {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 3;
    background: transparent;
    /* only active when controls are hidden */
  }
  #tap-catcher.hidden { display: none; }

  /* Fullscreen transition overlay */
  #fs-overlay {
    display: none;
    position: fixed;
    inset: 0; z-index: 200;
    background: #000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
  }
  #fs-overlay.show { display: flex; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="home">
  <div class="logo">
    <div class="logo-icon">▶</div>
    <h1>YTFS4U</h1>
    <p>Watch YouTube with captions in real fullscreen — no subtitles disappearing.</p>
  </div>
  <div class="input-wrap">
    <input type="text" id="url-input" placeholder="Paste YouTube URL or video ID"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    <div class="error-msg" id="error-msg">Couldn't find a YouTube video in that URL. Try pasting the full link.</div>
    <button class="go" onclick="loadVideo()">Watch →</button>
  </div>
  <p class="hint">Works with youtube.com links, youtu.be links,<br>playlists, and bare video IDs</p>
</div>

<div id="fs-overlay">
  <div class="spinner"></div>
  <span>Going fullscreen…</span>
</div>

<div id="player-screen">
  <!-- Layer 1: scrollable (behind everything, for chrome collapse) -->
  <div id="scroll-layer">
    <div id="scroll-layer-inner"></div>
  </div>

  <!-- Layer 2: YouTube iframe -->
  <div id="iframe-layer">
    <iframe id="yt-iframe" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>

  <!-- Layer 2.5: transparent tap catcher — above iframe, triggers controls -->
  <div id="tap-catcher"></div>

  <!-- Layer 3: controls overlay (fades, reappears on tap) -->
  <div id="controls-overlay">
    <button onclick="goHome()">← Back</button>
    <div class="spacer"></div>
    <button id="cc-btn" class="on" onclick="toggleCC()">CC</button>
    <button id="fs-btn" onclick="toggleFullscreen()">⛶</button>
  </div>
</div>

<script>
  let ccOn = true;
  let isFullscreen = false;
  let fadeTimer = null;
  const vv = window.visualViewport;

  // ── CONTROLS OVERLAY: fade out after 2.5s, reappear on tap ──
  function showControls() {
    const ov = document.getElementById('controls-overlay');
    const tc = document.getElementById('tap-catcher');
    ov.classList.remove('hidden');
    tc.classList.add('hidden'); // hide tap-catcher while controls visible (so buttons work)
    clearTimeout(fadeTimer);
    fadeTimer = setTimeout(() => {
      ov.classList.add('hidden');
      tc.classList.remove('hidden'); // re-enable tap-catcher when controls fade
    }, 2500);
  }

  // Tap-catcher sits above iframe and catches taps when controls are hidden
  document.getElementById('tap-catcher').addEventListener('click', showControls);

  // ── VISUAL VIEWPORT sizing ──
  function applyViewportSize() {
    const ps = document.getElementById('player-screen');
    if (!ps.classList.contains('active')) return;
    const h = vv ? vv.height : window.innerHeight;
    const t = vv ? vv.offsetTop : 0;
    ps.style.height = h + 'px';
    ps.style.top = t + 'px';
  }
  if (vv) { vv.addEventListener('resize', applyViewportSize); }
  window.addEventListener('resize', applyViewportSize);

  // ── URL PARSING ──
  function extractIds(raw) {
    raw = raw.trim();
    if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return { videoId: raw, listId: null };
    try {
      if (raw.includes('youtu.be/')) {
        if (!raw.startsWith('http')) raw = 'https://' + raw;
        const u = new URL(raw);
        return { videoId: u.pathname.slice(1).split('?')[0], listId: u.searchParams.get('list') };
      }
      if (!raw.startsWith('http')) raw = 'https://' + raw;
      const u = new URL(raw);
      return { videoId: u.searchParams.get('v'), listId: u.searchParams.get('list') };
    } catch { return { videoId: null, listId: null }; }
  }

  function buildSrc(videoId, listId, cc) {
    const params = new URLSearchParams({
      autoplay: '1', rel: '0', modestbranding: '1',
      cc_load_policy: cc ? '1' : '0', cc_lang_pref: 'en',
    });
    if (listId) { params.set('list', listId); params.set('listType', 'playlist'); }
    const base = videoId
      ? `https://www.youtube-nocookie.com/embed/${videoId}`
      : `https://www.youtube-nocookie.com/embed/videoseries`;
    return `${base}?${params.toString()}`;
  }

  // ── LOAD VIDEO ──
  function loadVideo() {
    const raw = document.getElementById('url-input').value;
    const err = document.getElementById('error-msg');
    err.classList.remove('show');
    const { videoId, listId } = extractIds(raw);
    if (!videoId && !listId) { err.classList.add('show'); return; }

    ccOn = true;
    document.getElementById('yt-iframe').src = buildSrc(videoId, listId, ccOn);
    document.getElementById('cc-btn').classList.add('on');
    document.getElementById('player-screen').classList.add('active');
    applyViewportSize();
    showControls();
  }

  function goHome() {
    isFullscreen = false;
    updateFsBtn();
    unlockScrollLayer();
    if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
    document.getElementById('player-screen').classList.remove('active');
    document.getElementById('player-screen').style.height = '';
    document.getElementById('player-screen').style.top = '';
    document.getElementById('yt-iframe').src = '';
  }

  function toggleCC() {
    ccOn = !ccOn;
    document.getElementById('cc-btn').classList.toggle('on', ccOn);
    const iframe = document.getElementById('yt-iframe');
    const url = new URL(iframe.src);
    url.searchParams.set('cc_load_policy', ccOn ? '1' : '0');
    url.searchParams.set('autoplay', '1');
    iframe.src = url.toString();
    showControls();
  }

  // ── FULLSCREEN ──
  async function toggleFullscreen() {
    if (isFullscreen) { exitFullscreen(); return; }

    const overlay = document.getElementById('fs-overlay');
    overlay.classList.add('show');

    // 1. Try requestFullscreen on player div (keeps our DOM, captions intact)
    const ps = document.getElementById('player-screen');
    try {
      if (ps.requestFullscreen) await ps.requestFullscreen();
      else if (ps.webkitRequestFullscreen) ps.webkitRequestFullscreen();
    } catch(e) {}

    // 2. Lock orientation to landscape
    try {
      if (screen.orientation && screen.orientation.lock) {
        await screen.orientation.lock('landscape');
      }
    } catch(e) {}

    // 3. Wait for orientation to physically complete
    await waitForOrientation();
    // 4. Wait for visualViewport to settle after chrome resets
    await waitForViewportSettle();

    // 5. Scroll the bottom scroll-layer to collapse Brave chrome
    await collapseChrome();

    // 6. Lock scroll-layer so user can't bring chrome back
    lockScrollLayer();

    // 7. Resize to full visualViewport
    applyViewportSize();
    overlay.classList.remove('show');

    isFullscreen = true;
    updateFsBtn();
    showControls();
  }

  // Wait for orientationchange event (rotation physically done)
  function waitForOrientation() {
    return new Promise(resolve => {
      // If orientation already matches landscape, resolve immediately
      if (screen.orientation && screen.orientation.type.includes('landscape')) {
        return resolve();
      }
      const handler = () => {
        screen.orientation.removeEventListener('change', handler);
        window.removeEventListener('orientationchange', handler);
        resolve();
      };
      if (screen.orientation) {
        screen.orientation.addEventListener('change', handler);
      } else {
        window.addEventListener('orientationchange', handler);
      }
      // Safety timeout — resolve after 1.5s regardless
      setTimeout(resolve, 1500);
    });
  }

  // Wait for visualViewport to stop changing (chrome has settled)
  function waitForViewportSettle() {
    return new Promise(resolve => {
      if (!vv) return setTimeout(resolve, 300);
      let timer;
      const handler = () => {
        clearTimeout(timer);
        // Resolve 150ms after last resize event — viewport is stable
        timer = setTimeout(() => {
          vv.removeEventListener('resize', handler);
          resolve();
        }, 150);
      };
      vv.addEventListener('resize', handler);
      // Safety: if no resize fires within 800ms, proceed anyway
      setTimeout(() => {
        vv.removeEventListener('resize', handler);
        clearTimeout(timer);
        resolve();
      }, 800);
    });
  }

  // Scroll the dedicated scroll-layer div (not window) — it sits behind the iframe
  // and is scrollable independently, giving us a scrollable surface even under a fixed player
  async function collapseChrome() {
    const sl = document.getElementById('scroll-layer');
    const startH = vv ? vv.height : window.innerHeight;
    let lastH = startH;
    let stableCount = 0;

    for (let i = 0; i < 80; i++) {
      sl.scrollTop += 6;
      // Also try window scroll as fallback
      window.scrollBy({ top: 6, behavior: 'instant' });
      await sleep(25);

      const nowH = vv ? vv.height : window.innerHeight;
      if (nowH > lastH) {
        lastH = nowH;
        stableCount = 0;
      } else {
        stableCount++;
        if (stableCount >= 6 && nowH > startH) break;
        if (stableCount >= 20) break; // give up if no change after 20 stable checks
      }
    }
  }

  function lockScrollLayer() {
    const sl = document.getElementById('scroll-layer');
    sl.style.overflowY = 'hidden';
    sl.style.pointerEvents = 'none';
  }

  function unlockScrollLayer() {
    const sl = document.getElementById('scroll-layer');
    sl.style.overflowY = 'scroll';
    sl.style.pointerEvents = '';
  }

  function exitFullscreen() {
    unlockScrollLayer();
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      (document.exitFullscreen || document.webkitExitFullscreen || (() => {})).call(document);
    }
    if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
    isFullscreen = false;
    updateFsBtn();
    applyViewportSize();
    showControls();
  }

  function updateFsBtn() {
    document.getElementById('fs-btn').textContent = isFullscreen ? '✕FS' : '⛶';
  }

  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) { isFullscreen = false; updateFsBtn(); }
  });
  document.addEventListener('webkitfullscreenchange', () => {
    if (!document.webkitFullscreenElement) { isFullscreen = false; updateFsBtn(); }
  });

  // ── PULL-TO-REFRESH: block on home screen ──
  let lastTouchY = 0;
  document.addEventListener('touchstart', e => { lastTouchY = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (window.scrollY <= 0 && e.touches[0].clientY > lastTouchY) e.preventDefault();
  }, { passive: false });

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadVideo();
  });

  const urlParams = new URLSearchParams(window.location.search);
  const prefill = urlParams.get('url') || urlParams.get('v');
  if (prefill) { document.getElementById('url-input').value = prefill; loadVideo(); }
</script>
</body>
</html>
