<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>YTFS4U</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #FF0000;
    --dark: #0a0a0a;
    --mid: #161616;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #555;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── HOME SCREEN ── */
  #home {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 32px;
  }

  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
  }

  .logo-icon {
    width: 56px;
    height: 56px;
    background: var(--red);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }

  .logo h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.03em;
  }

  .logo p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    max-width: 260px;
  }

  .input-wrap {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus { border-color: var(--red); }

  button.go {
    width: 100%;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  button.go:active { opacity: 0.8; transform: scale(0.98); }

  .hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  /* ── PLAYER SCREEN ── */
  #player-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    background: #000;
    position: relative;
  }

  #player-screen.active {
    display: flex;
  }

  /* Top bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    padding-top: max(10px, env(safe-area-inset-top));
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 10;
    gap: 12px;
    flex-shrink: 0;
  }

  .back-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .back-btn:active { opacity: 0.6; }

  .video-title {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    text-align: center;
  }

  .cc-toggle {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
    flex-shrink: 0;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .cc-toggle.on {
    background: var(--red);
  }

  /* iframe fills the rest */
  .iframe-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #yt-iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* error */
  .error-msg {
    display: none;
    background: #1a0000;
    border: 1px solid #440000;
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    color: #ff6666;
    width: 100%;
    max-width: 420px;
    text-align: center;
    line-height: 1.5;
  }

  .error-msg.show { display: block; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <div class="logo">
    <div class="logo-icon">▶</div>
    <h1>YTFS4U</h1>
    <p>Watch YouTube with captions in a real fullscreen — no subtitles disappearing.</p>
  </div>

  <div class="input-wrap">
    <input
      type="text"
      id="url-input"
      placeholder="Paste YouTube URL or video ID"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    />
    <div class="error-msg" id="error-msg">Couldn't find a YouTube video in that URL. Try pasting the full link from the YouTube app or browser.</div>
    <button class="go" onclick="loadVideo()">Watch →</button>
  </div>

  <p class="hint">Works with youtube.com links, youtu.be links,<br>playlists, and bare video IDs</p>
</div>

<!-- PLAYER -->
<div id="player-screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <span class="video-title" id="video-title"></span>
    <button class="cc-toggle on" id="cc-btn" onclick="toggleCC()">CC</button>
  </div>
  <div class="iframe-wrap">
    <iframe
      id="yt-iframe"
      allow="autoplay; fullscreen"
      allowfullscreen
    ></iframe>
  </div>
</div>

<script>
  let ccOn = true;
  let currentVideoId = '';
  let currentListId = '';

  function extractIds(raw) {
    raw = raw.trim();

    // bare video ID (11 chars alphanumeric + - _)
    if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) {
      return { videoId: raw, listId: null };
    }

    try {
      // handle youtu.be/ID
      if (raw.includes('youtu.be/')) {
        if (!raw.startsWith('http')) raw = 'https://' + raw;
        const u = new URL(raw);
        const videoId = u.pathname.slice(1).split('?')[0];
        const listId = u.searchParams.get('list');
        return { videoId, listId };
      }

      if (!raw.startsWith('http')) raw = 'https://' + raw;
      const u = new URL(raw);
      const videoId = u.searchParams.get('v');
      const listId = u.searchParams.get('list');

      // playlist with no specific video
      if (!videoId && listId) return { videoId: null, listId };

      return { videoId, listId };
    } catch {
      return { videoId: null, listId: null };
    }
  }

  function buildSrc(videoId, listId, cc) {
    const params = new URLSearchParams({
      autoplay: '1',
      rel: '0',
      modestbranding: '1',
      cc_load_policy: cc ? '1' : '0',
      cc_lang_pref: 'en',
    });

    if (listId) {
      params.set('list', listId);
      params.set('listType', 'playlist');
    }

    const base = videoId
      ? `https://www.youtube-nocookie.com/embed/${videoId}`
      : `https://www.youtube-nocookie.com/embed/videoseries`;

    return `${base}?${params.toString()}`;
  }

  function loadVideo() {
    const raw = document.getElementById('url-input').value;
    const err = document.getElementById('error-msg');
    err.classList.remove('show');

    const { videoId, listId } = extractIds(raw);

    if (!videoId && !listId) {
      err.classList.add('show');
      return;
    }

    currentVideoId = videoId || '';
    currentListId = listId || '';
    ccOn = true;

    const iframe = document.getElementById('yt-iframe');
    iframe.src = buildSrc(currentVideoId, currentListId, ccOn);

    document.getElementById('cc-btn').classList.add('on');
    document.getElementById('video-title').textContent = '';

    document.getElementById('home').style.display = 'none';
    document.getElementById('player-screen').classList.add('active');

    // Try to lock orientation to landscape
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }
  }

  function toggleCC() {
    ccOn = !ccOn;
    const btn = document.getElementById('cc-btn');
    btn.classList.toggle('on', ccOn);

    // Reload iframe with updated cc param
    const iframe = document.getElementById('yt-iframe');
    const currentSrc = iframe.src;
    const url = new URL(currentSrc);
    url.searchParams.set('cc_load_policy', ccOn ? '1' : '0');
    url.searchParams.set('autoplay', '1');
    iframe.src = url.toString();
  }

  function goHome() {
    document.getElementById('player-screen').classList.remove('active');
    document.getElementById('home').style.display = '';
    document.getElementById('yt-iframe').src = '';

    if (screen.orientation && screen.orientation.unlock) {
      screen.orientation.unlock();
    }
  }

  // Allow pressing Enter on input
  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadVideo();
  });

  // Pre-fill from ?v= or ?url= query param (for future bookmarklet integration)
  const urlParams = new URLSearchParams(window.location.search);
  const prefill = urlParams.get('url') || urlParams.get('v');
  if (prefill) {
    document.getElementById('url-input').value = prefill;
    loadVideo();
  }
</script>
</body>
</html>
