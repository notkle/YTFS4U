<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>YTFS4U</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #FF0000;
    --dark: #0a0a0a;
    --mid: #161616;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #555;
  }

  html {
    height: 100%;
    /* Keep body scrollable underneath fixed player for nudge trick */
    overflow-y: scroll;
  }

  body {
    min-height: 100%;
    /* Extra height so window.scrollBy actually works */
    padding-bottom: 200px;
    background: var(--dark);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  #home {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 32px;
  }

  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
  }

  .logo-icon {
    width: 56px; height: 56px;
    background: var(--red);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }

  .logo h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; }
  .logo p { font-size: 13px; color: var(--muted); line-height: 1.5; max-width: 260px; }

  .input-wrap {
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column; gap: 10px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus { border-color: var(--red); }

  button.go {
    width: 100%;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button.go:active { opacity: 0.8; }

  .hint { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.6; }

  .error-msg {
    display: none;
    background: #1a0000;
    border: 1px solid #440000;
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    color: #ff6666;
    text-align: center;
    line-height: 1.5;
  }
  .error-msg.show { display: block; }

  /* ── PLAYER ── */
  #player-screen {
    display: none;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    /* Height set dynamically via JS to match visualViewport */
    background: #000;
    z-index: 100;
  }
  #player-screen.active { display: flex; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #000;
    gap: 10px;
    flex-shrink: 0;
    /* Fixed small height so iframe gets maximum space */
    height: 48px;
  }

  .top-bar button {
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
    flex-shrink: 0;
    height: 32px;
    display: flex;
    align-items: center;
  }
  .top-bar button:active { opacity: 0.6; }
  .top-bar button.on { background: var(--red); }

  .video-title {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    text-align: center;
  }

  /* iframe fills everything below top bar */
  .iframe-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
    min-height: 0;
  }

  #yt-iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  /* Spinner shown while collapsing chrome */
  #fs-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
  }
  #fs-overlay.show { display: flex; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="home">
  <div class="logo">
    <div class="logo-icon">▶</div>
    <h1>YTFS4U</h1>
    <p>Watch YouTube with captions in real fullscreen — no subtitles disappearing.</p>
  </div>
  <div class="input-wrap">
    <input type="text" id="url-input" placeholder="Paste YouTube URL or video ID"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    <div class="error-msg" id="error-msg">Couldn't find a YouTube video in that URL. Try pasting the full link.</div>
    <button class="go" onclick="loadVideo()">Watch →</button>
  </div>
  <p class="hint">Works with youtube.com links, youtu.be links,<br>playlists, and bare video IDs</p>
</div>

<!-- Fullscreen transition overlay -->
<div id="fs-overlay">
  <div class="spinner"></div>
  <span>Going fullscreen…</span>
</div>

<div id="player-screen">
  <div class="top-bar">
    <button onclick="goHome()">← Back</button>
    <span class="video-title" id="video-title"></span>
    <button id="cc-btn" class="on" onclick="toggleCC()">CC</button>
    <button id="fs-btn" onclick="toggleFullscreen()">⛶</button>
  </div>
  <div class="iframe-wrap">
    <iframe id="yt-iframe" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>
</div>

<script>
  let ccOn = true;
  let isFullscreen = false;

  // ── VISUAL VIEWPORT: source of truth for available height ──
  const vv = window.visualViewport;

  function applyViewportSize() {
    const ps = document.getElementById('player-screen');
    if (!ps.classList.contains('active')) return;
    const h = vv ? vv.height : window.innerHeight;
    ps.style.height = h + 'px';
    ps.style.top = (vv ? vv.offsetTop : 0) + 'px';
  }

  if (vv) {
    vv.addEventListener('resize', applyViewportSize);
    vv.addEventListener('scroll', applyViewportSize);
  }
  window.addEventListener('resize', applyViewportSize);

  // ── URL PARSING ──
  function extractIds(raw) {
    raw = raw.trim();
    if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return { videoId: raw, listId: null };
    try {
      if (raw.includes('youtu.be/')) {
        if (!raw.startsWith('http')) raw = 'https://' + raw;
        const u = new URL(raw);
        return { videoId: u.pathname.slice(1).split('?')[0], listId: u.searchParams.get('list') };
      }
      if (!raw.startsWith('http')) raw = 'https://' + raw;
      const u = new URL(raw);
      return { videoId: u.searchParams.get('v'), listId: u.searchParams.get('list') };
    } catch { return { videoId: null, listId: null }; }
  }

  function buildSrc(videoId, listId, cc) {
    const params = new URLSearchParams({
      autoplay: '1', rel: '0', modestbranding: '1',
      cc_load_policy: cc ? '1' : '0', cc_lang_pref: 'en',
    });
    if (listId) { params.set('list', listId); params.set('listType', 'playlist'); }
    const base = videoId
      ? `https://www.youtube-nocookie.com/embed/${videoId}`
      : `https://www.youtube-nocookie.com/embed/videoseries`;
    return `${base}?${params.toString()}`;
  }

  // ── LOAD VIDEO ──
  function loadVideo() {
    const raw = document.getElementById('url-input').value;
    const err = document.getElementById('error-msg');
    err.classList.remove('show');
    const { videoId, listId } = extractIds(raw);
    if (!videoId && !listId) { err.classList.add('show'); return; }

    ccOn = true;
    document.getElementById('yt-iframe').src = buildSrc(videoId, listId, ccOn);
    document.getElementById('cc-btn').classList.add('on');

    const ps = document.getElementById('player-screen');
    ps.classList.add('active');
    applyViewportSize();
  }

  function goHome() {
    isFullscreen = false;
    updateFsBtn();
    if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
    document.getElementById('player-screen').classList.remove('active');
    document.getElementById('player-screen').style.height = '';
    document.getElementById('yt-iframe').src = '';
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function toggleCC() {
    ccOn = !ccOn;
    document.getElementById('cc-btn').classList.toggle('on', ccOn);
    const iframe = document.getElementById('yt-iframe');
    const url = new URL(iframe.src);
    url.searchParams.set('cc_load_policy', ccOn ? '1' : '0');
    url.searchParams.set('autoplay', '1');
    iframe.src = url.toString();
  }

  // ── FULLSCREEN: lock landscape → wait → scroll until chrome gone → resize ──
  async function toggleFullscreen() {
    if (isFullscreen) {
      exitFullscreen();
      return;
    }

    const overlay = document.getElementById('fs-overlay');
    overlay.classList.add('show');

    // 1. Lock to landscape
    if (screen.orientation && screen.orientation.lock) {
      try { await screen.orientation.lock('landscape'); } catch(e) {}
    }

    // 2. Wait for orientation + chrome reset to settle
    await sleep(600);

    // 3. Scroll body downward until visualViewport.height stops growing
    await collapseChrome();

    // 4. Resize player to full visualViewport, hide overlay
    applyViewportSize();
    overlay.classList.remove('show');

    lockScroll(); // prevent any swipe bringing chrome back
    isFullscreen = true;
    updateFsBtn();
  }

  async function collapseChrome() {
    const startH = vv ? vv.height : window.innerHeight;
    let lastH = startH;
    let stableCount = 0;

    // Scroll down in steps — body has 200px padding so scrollBy works
    for (let i = 0; i < 60; i++) {
      window.scrollBy({ top: 8, behavior: 'instant' });
      await sleep(30);

      const nowH = vv ? vv.height : window.innerHeight;

      if (nowH > lastH) {
        // Height grew — chrome is collapsing, keep going until stable
        lastH = nowH;
        stableCount = 0;
      } else {
        stableCount++;
        // Stable for 5 consecutive checks = done
        if (stableCount >= 5 && nowH > startH) break;
        // Also stop if we've been stable a long time even if no change
        if (stableCount >= 15) break;
      }
    }
  }

  function exitFullscreen() {
    unlockScroll();
    if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
    isFullscreen = false;
    updateFsBtn();
    window.scrollTo({ top: 0, behavior: 'instant' });
    applyViewportSize();
  }

  function updateFsBtn() {
    document.getElementById('fs-btn').textContent = isFullscreen ? '✕FS' : '⛶';
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ── PULL-TO-REFRESH + SCROLL LOCK ──
  function blockTouch(e) { e.preventDefault(); }

  function lockScroll() {
    document.addEventListener('touchmove', blockTouch, { passive: false });
  }

  function unlockScroll() {
    document.removeEventListener('touchmove', blockTouch);
  }

  // Block pull-to-refresh at all times (even on home screen)
  let lastTouchY = 0;
  document.addEventListener('touchstart', e => { lastTouchY = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (window.scrollY <= 0 && e.touches[0].clientY > lastTouchY) {
      e.preventDefault();
    }
  }, { passive: false });

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadVideo();
  });

  const urlParams = new URLSearchParams(window.location.search);
  const prefill = urlParams.get('url') || urlParams.get('v');
  if (prefill) { document.getElementById('url-input').value = prefill; loadVideo(); }
</script>
</body>
</html>
