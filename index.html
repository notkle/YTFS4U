<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>YTFS4U</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #FF0000;
    --dark: #0a0a0a;
    --mid: #161616;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #555;
  }

  /* Base page always scrollable — this is what Brave watches for chrome hide */
  html {
    height: 100%;
    overflow-y: scroll;
  }
  body {
    min-height: 100%;
    padding-bottom: 400px; /* real scroll room */
    background: var(--dark);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* ── HOME ── */
  #home {
    height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px; gap: 32px;
  }
  .logo {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px; text-align: center;
  }
  .logo-icon {
    width: 56px; height: 56px; background: var(--red);
    border-radius: 14px; display: flex; align-items: center;
    justify-content: center; font-size: 26px;
  }
  .logo h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; }
  .logo p { font-size: 13px; color: var(--muted); line-height: 1.5; max-width: 260px; }
  .input-wrap { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 10px; }
  input[type="text"] {
    width: 100%; background: var(--mid); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px; font-size: 15px; color: var(--text);
    outline: none; transition: border-color 0.15s; -webkit-appearance: none;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus { border-color: var(--red); }
  button.go {
    width: 100%; background: var(--red); color: #fff; border: none;
    border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 600;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  button.go:active { opacity: 0.8; }
  .hint { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.6; }
  .error-msg {
    display: none; background: #1a0000; border: 1px solid #440000;
    border-radius: 10px; padding: 14px 18px; font-size: 13px;
    color: #ff6666; text-align: center; line-height: 1.5;
  }
  .error-msg.show { display: block; }

  /* ── PLAYER ── */
  #player-screen {
    display: none;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; width: 100%;
    background: #000;
    z-index: 100;
  }
  #player-screen.active { display: flex; }

  /* Top bar — real DOM element, swipeable, passes scroll to base page */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    background: #000;
    gap: 10px;
    flex-shrink: 0;
    /* Tall enough to swipe on comfortably */
    height: 56px;
    /* Subtle swipe hint gradient at bottom */
    border-bottom: 1px solid rgba(255,255,255,0.06);
    position: relative;
    z-index: 2;
  }

  /* Swipe indicator label in top bar */
  .swipe-label {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
  }
  /* Hide swipe label once fullscreen locked */
  #player-screen.fs-locked .swipe-label { display: none; }

  .top-bar button {
    background: rgba(255,255,255,0.12);
    border: none; color: #fff; border-radius: 8px;
    padding: 7px 13px; font-size: 13px; font-weight: 600;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    white-space: nowrap; flex-shrink: 0;
  }
  .top-bar button:active { opacity: 0.6; }
  .top-bar button.on { background: var(--red); }
  .spacer { flex: 1; }

  /* iframe fills everything below top bar */
  .iframe-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
    min-height: 0;
  }
  #yt-iframe {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    border: none;
  }
</style>
</head>
<body>

<div id="home">
  <div class="logo">
    <div class="logo-icon">▶</div>
    <h1>YTFS4U</h1>
    <p>Watch YouTube with captions in real fullscreen — no subtitles disappearing.</p>
  </div>
  <div class="input-wrap">
    <input type="text" id="url-input" placeholder="Paste YouTube URL or video ID"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    <div class="error-msg" id="error-msg">Couldn't find a YouTube video. Try pasting the full link.</div>
    <button class="go" onclick="loadVideo()">Watch →</button>
  </div>
  <p class="hint">Works with youtube.com, youtu.be, playlists, and bare video IDs</p>
</div>

<div id="player-screen">
  <div class="top-bar">
    <button onclick="goHome()">← Back</button>
    <div class="spacer"></div>
    <button id="cc-btn" class="on" onclick="toggleCC()">CC</button>
    <button id="fs-btn" onclick="toggleFullscreen()">⛶</button>
    <span class="swipe-label">swipe up here to hide chrome</span>
  </div>
  <div class="iframe-wrap">
    <iframe id="yt-iframe" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>
</div>

<script>
  let ccOn = true;
  let isFullscreen = false;
  let chromeWatcher = null;
  const vv = window.visualViewport;

  // ── VISUAL VIEWPORT: size player to true visible area ──
  function applyViewportSize() {
    const ps = document.getElementById('player-screen');
    if (!ps.classList.contains('active')) return;
    const h = vv ? vv.height : window.innerHeight;
    const t = vv ? vv.offsetTop : 0;
    ps.style.height = h + 'px';
    ps.style.top = t + 'px';
  }
  if (vv) { vv.addEventListener('resize', applyViewportSize); }
  window.addEventListener('resize', applyViewportSize);

  // ── URL PARSING ──
  function extractIds(raw) {
    raw = raw.trim();
    if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return { videoId: raw, listId: null };
    try {
      if (raw.includes('youtu.be/')) {
        if (!raw.startsWith('http')) raw = 'https://' + raw;
        const u = new URL(raw);
        return { videoId: u.pathname.slice(1).split('?')[0], listId: u.searchParams.get('list') };
      }
      if (!raw.startsWith('http')) raw = 'https://' + raw;
      const u = new URL(raw);
      return { videoId: u.searchParams.get('v'), listId: u.searchParams.get('list') };
    } catch { return { videoId: null, listId: null }; }
  }

  function buildSrc(videoId, listId, cc) {
    const params = new URLSearchParams({
      autoplay: '1', rel: '0', modestbranding: '1',
      cc_load_policy: cc ? '1' : '0', cc_lang_pref: 'en',
    });
    if (listId) { params.set('list', listId); params.set('listType', 'playlist'); }
    const base = videoId
      ? `https://www.youtube-nocookie.com/embed/${videoId}`
      : `https://www.youtube-nocookie.com/embed/videoseries`;
    return `${base}?${params.toString()}`;
  }

  // ── LOAD VIDEO ──
  function loadVideo() {
    const raw = document.getElementById('url-input').value;
    const err = document.getElementById('error-msg');
    err.classList.remove('show');
    const { videoId, listId } = extractIds(raw);
    if (!videoId && !listId) { err.classList.add('show'); return; }
    ccOn = true;
    document.getElementById('yt-iframe').src = buildSrc(videoId, listId, ccOn);
    document.getElementById('cc-btn').classList.add('on');
    document.getElementById('home').style.display = 'none';
    const ps = document.getElementById('player-screen');
    ps.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'instant' });
    applyViewportSize();
  }

  function goHome() {
    stopChromeWatcher();
    isFullscreen = false;
    updateFsBtn();
    if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
    const ps = document.getElementById('player-screen');
    ps.classList.remove('active', 'fs-locked');
    ps.style.height = '';
    ps.style.top = '';
    document.getElementById('home').style.display = '';
    document.getElementById('yt-iframe').src = '';
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function toggleCC() {
    ccOn = !ccOn;
    document.getElementById('cc-btn').classList.toggle('on', ccOn);
    const iframe = document.getElementById('yt-iframe');
    const url = new URL(iframe.src);
    url.searchParams.set('cc_load_policy', ccOn ? '1' : '0');
    url.searchParams.set('autoplay', '1');
    iframe.src = url.toString();
  }

  // ── FULLSCREEN ──
  async function toggleFullscreen() {
    if (isFullscreen) { exitFullscreen(); return; }

    // Lock landscape
    try {
      if (screen.orientation && screen.orientation.lock) {
        await screen.orientation.lock('landscape');
      }
    } catch(e) {}

    // Wait for orientation to settle
    await waitForOrientation();

    // Reset scroll to top so there's max room to scroll up
    window.scrollTo({ top: 0, behavior: 'instant' });

    // Watch for chrome collapse via visualViewport growing
    // User swipes up on the top bar to trigger it
    const startH = vv ? vv.height : window.innerHeight;
    stopChromeWatcher();
    chromeWatcher = setInterval(() => {
      const nowH = vv ? vv.height : window.innerHeight;
      if (nowH > startH + 10) {
        stopChromeWatcher();
        // Chrome gone — snap player to full viewport and lock
        applyViewportSize();
        document.getElementById('player-screen').classList.add('fs-locked');
        isFullscreen = true;
        updateFsBtn();
      }
    }, 80);

    updateFsBtn(); // show ✕FS while waiting
    isFullscreen = true; // optimistic — lets btn show exit state
  }

  function exitFullscreen() {
    stopChromeWatcher();
    if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
    document.getElementById('player-screen').classList.remove('fs-locked');
    isFullscreen = false;
    updateFsBtn();
    window.scrollTo({ top: 0, behavior: 'instant' });
    applyViewportSize();
  }

  function stopChromeWatcher() {
    if (chromeWatcher) { clearInterval(chromeWatcher); chromeWatcher = null; }
  }

  function updateFsBtn() {
    document.getElementById('fs-btn').textContent = isFullscreen ? '✕FS' : '⛶';
  }

  function waitForOrientation() {
    return new Promise(resolve => {
      if (screen.orientation && screen.orientation.type.includes('landscape')) return resolve();
      const handler = () => {
        if (screen.orientation) screen.orientation.removeEventListener('change', handler);
        window.removeEventListener('orientationchange', handler);
        resolve();
      };
      if (screen.orientation) screen.orientation.addEventListener('change', handler);
      else window.addEventListener('orientationchange', handler);
      setTimeout(resolve, 1500);
    });
  }

  // Pull-to-refresh block
  let lastTouchY = 0;
  document.addEventListener('touchstart', e => { lastTouchY = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (window.scrollY <= 0 && e.touches[0].clientY > lastTouchY) e.preventDefault();
  }, { passive: false });

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadVideo();
  });

  const urlParams = new URLSearchParams(window.location.search);
  const prefill = urlParams.get('url') || urlParams.get('v');
  if (prefill) { document.getElementById('url-input').value = prefill; loadVideo(); }
</script>
</body>
</html>
